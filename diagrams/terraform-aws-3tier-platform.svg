<text class="ts" x="500" y="272" text-anchor="middle" dominant-baseline="central" fill="#444441">0.0.0.0/0  →  IGW</text>
<text class="ts" x="500" y="290" text-anchor="middle" dominant-baseline="central" fill="#444441">10.0.0.0/16  →  local</text>

<!-- Public route note -->
<rect x="380" y="328" width="240" height="44" rx="8" fill="#E8F5E9" stroke="#388E3C" stroke-width="0.8"/>
<text class="th" x="500" y="346" text-anchor="middle" dominant-baseline="central" fill="#1B5E20" font-size="12">Internet-accessible tier</text>
<text class="ts" x="500" y="362" text-anchor="middle" dominant-baseline="central" fill="#2E7D32" font-size="11">receives inbound HTTP/HTTPS</text>

<!-- ── PRIVATE SUBNET ── -->
<rect x="142" y="482" width="500" height="260" rx="10" fill="#FFF8E1" fill-opacity="0.5" stroke="#F57F17" stroke-width="0.8" stroke-dasharray="4 3"/>
<rect x="142" y="482" width="184" height="20" rx="4" fill="#F57F17" fill-opacity="0.85"/>
<text class="ts" x="152" y="496" fill="#FFFFFF" dominant-baseline="central" font-size="11">Private subnet · 10.0.11.0/24</text>

<!-- Backend EC2 card -->
<rect x="158" y="510" width="202" height="212" rx="10" fill="#FFFFFF" stroke="#EF9F27" stroke-width="1"/>
<rect x="158" y="510" width="202" height="36" rx="10" fill="#854F0B"/>
<rect x="158" y="534" width="202" height="12" fill="#854F0B"/>
<text class="th" x="259" y="533" text-anchor="middle" dominant-baseline="central" fill="#FFFFFF">EC2 · Backend</text>
<text class="ts" x="259" y="558" text-anchor="middle" dominant-baseline="central" fill="#444441">Amazon Linux 2 · t2.micro</text>

<!-- Docker badge: API -->
<rect x="174" y="574" width="170" height="56" rx="7" fill="#FAEEDA" stroke="#EF9F27" stroke-width="0.8"/>
<rect x="174" y="574" width="170" height="22" rx="7" fill="#854F0B"/>
<rect x="174" y="588" width="170" height="8" fill="#854F0B"/>
<text class="ts" x="259" y="587" text-anchor="middle" dominant-baseline="central" fill="#FFFFFF" font-size="11">Docker container</text>
<text class="th" x="259" y="607" text-anchor="middle" dominant-baseline="central" fill="#633806" font-size="12">Backend API · port 3000</text>

<!-- SG badge backend -->
<rect x="174" y="642" width="170" height="36" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8" stroke-dasharray="3 2"/>
<text class="ts" x="259" y="656" text-anchor="middle" dominant-baseline="central" fill="#BF360C" font-size="11">Security Group</text>
<text class="ts" x="259" y="671" text-anchor="middle" dominant-baseline="central" fill="#E65100" font-size="10">allow :3000 from SG-Frontend</text>

<!-- No public IP badge -->
<rect x="174" y="690" width="170" height="22" rx="5" fill="#FCE4EC" stroke="#C62828" stroke-width="0.8"/>
<text class="ts" x="259" y="705" text-anchor="middle" dominant-baseline="central" fill="#B71C1C" font-size="11">No public IP · isolated</text>

<!-- Route table private -->
<rect x="380" y="510" width="240" height="88" rx="10" fill="#FFFFFF" stroke="#FFE082" stroke-width="1"/>
<rect x="380" y="510" width="240" height="30" rx="10" fill="#F57F17" fill-opacity="0.12"/>
<rect x="380" y="532" width="240" height="8" fill="#F57F17" fill-opacity="0.12"/>
<text class="th" x="500" y="530" text-anchor="middle" dominant-baseline="central" fill="#E65100">Route table · private</text>
<text class="ts" x="500" y="554" text-anchor="middle" dominant-baseline="central" fill="#444441">10.0.0.0/16  →  local</text>
<text class="ts" x="500" y="572" text-anchor="middle" dominant-baseline="central" fill="#C62828">no IGW route</text>

<!-- Private note -->
<rect x="380" y="610" width="240" height="44" rx="8" fill="#FCE4EC" stroke="#C62828" stroke-width="0.8"/>
<text class="th" x="500" y="628" text-anchor="middle" dominant-baseline="central" fill="#B71C1C" font-size="12">Internal-only tier</text>
<text class="ts" x="500" y="644" text-anchor="middle" dominant-baseline="central" fill="#C62828" font-size="11">no direct internet access</text>

<!-- ── TERRAFORM BLOCK (outside AWS cloud) ── -->
<rect x="20" y="300" width="84" height="184" rx="10" fill="#F3E8FF" stroke="#7C3AED" stroke-width="1" stroke-dasharray="3 2"/>
<rect x="20" y="300" width="84" height="24" rx="10" fill="#7C3AED"/>
<rect x="20" y="316" width="84" height="8" fill="#7C3AED"/>
