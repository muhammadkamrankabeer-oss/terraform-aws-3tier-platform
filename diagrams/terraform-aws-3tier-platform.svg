<text class="th" x="259" y="251" text-anchor="middle" dominant-baseline="central" fill="#FFFFFF">EC2 · Frontend</text>
<text class="ts" x="259" y="276" text-anchor="middle" dominant-baseline="central" fill="#444441">Amazon Linux 2 · t2.micro</text>

<!-- Docker badge: Nginx -->
<rect x="174" y="292" width="170" height="56" rx="7" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
