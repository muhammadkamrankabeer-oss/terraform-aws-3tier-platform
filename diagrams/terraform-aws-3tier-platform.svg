<text class="ts" x="140" y="111" fill="#FFFFFF" dominant-baseline="central" font-size="11">VPC · 10.0.0.0/16</text>

<!-- ── INTERNET GATEWAY ── -->
<rect x="260" y="132" width="160" height="48" rx="8" fill="#0C447C" stroke="#185FA5" stroke-width="0.5"/>
