<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1360" height="1720" viewBox="0 0 680 860">
<title>Terraform AWS 3-Tier Platform — Architecture Diagram</title>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: 'Segoe UI', Arial, sans-serif; fill: #1a1a2e; }
    .th { font-size: 14px; font-weight: 600; }
    .ts { font-size: 12px; font-weight: 400; }
  </style>
</defs>

<!-- White background for PNG export -->
<rect width="680" height="860" fill="#F8FAFD"/>

<!-- Decorative header bar -->
<rect x="0" y="0" width="680" height="48" fill="#0C2D57" rx="0"/>
<text class="th" x="340" y="20" text-anchor="middle" fill="#FFFFFF" font-size="15" dominant-baseline="central" dy="4">Terraform AWS 3-Tier Platform</text>
<text class="ts" x="340" y="38" text-anchor="middle" fill="#85B7EB" font-size="11" dominant-baseline="central">Infrastructure provisioned by Terraform · VPC 10.0.0.0/16</text>

<!-- ── AWS CLOUD BOUNDARY ── -->
<rect x="118" y="62" width="548" height="756" rx="16" fill="#EAF3FF" fill-opacity="0.5" stroke="#185FA5" stroke-width="1.2" stroke-dasharray="7 4"/>
<rect x="118" y="62" width="94" height="22" rx="4" fill="#185FA5"/>
<text class="ts" x="128" y="77" fill="#FFFFFF" dominant-baseline="central" font-size="11">AWS Cloud</text>

<!-- ── VPC BOUNDARY ── -->
<rect x="130" y="96" width="524" height="710" rx="12" fill="#E6F1FB" fill-opacity="0.3" stroke="#378ADD" stroke-width="0.8" stroke-dasharray="5 3"/>
