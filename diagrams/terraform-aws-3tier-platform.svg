<rect x="29" y="334" width="66" height="36" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="0.8"/>
<text class="th" x="62" y="348" text-anchor="middle" dominant-baseline="central" fill="#5B21B6" font-size="11">vpc</text>
<text class="ts" x="62" y="362" text-anchor="middle" dominant-baseline="central" fill="#7C3AED" font-size="10">module</text>

<rect x="29" y="378" width="66" height="36" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="0.8"/>
<text class="th" x="62" y="392" text-anchor="middle" dominant-baseline="central" fill="#5B21B6" font-size="11">sec_groups</text>
<text class="ts" x="62" y="406" text-anchor="middle" dominant-baseline="central" fill="#7C3AED" font-size="10">module</text>

<rect x="29" y="422" width="66" height="36" rx="6" fill="#EDE9FE" stroke="#7C3AED" stroke-width="0.8"/>
<text class="th" x="62" y="436" text-anchor="middle" dominant-baseline="central" fill="#5B21B6" font-size="11">ec2</text>
<text class="ts" x="62" y="450" text-anchor="middle" dominant-baseline="central" fill="#7C3AED" font-size="10">module</text>

<!-- Terraform → VPC arrow -->
<path d="M104 392 L130 392" fill="none" stroke="#7C3AED" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text class="ts" x="117" y="385" text-anchor="middle" fill="#7C3AED" font-size="10">provisions</text>

<!-- ── TRAFFIC FLOW ARROWS ── -->

<!-- Internet → cloud top -->
<text class="th" x="340" y="34" text-anchor="middle" fill="#0C2D57" dominant-baseline="central" font-size="13">Internet · users</text>
<path d="M340 48 L340 62" fill="none" stroke="#185FA5" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="356" y="57" fill="#185FA5" font-size="11">port 8080</text>

<!-- Cloud → IGW -->
<path d="M340 84 L340 132" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- IGW ↔ frontend (down) -->
<path d="M340 180 L340 228" fill="none" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- response back up (dashed) -->
<path d="M334 228 L334 180" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
<text class="ts" x="356" y="208" fill="#185FA5" font-size="11">via route table</text>

<!-- Frontend → Backend (internal) -->
<path d="M259 440 L259 510" fill="none" stroke="#388E3C" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
<text class="ts" x="278" y="479" fill="#2E7D32" font-size="11">port 3000</text>
<text class="ts" x="278" y="493" fill="#2E7D32" font-size="11">internal only</text>

