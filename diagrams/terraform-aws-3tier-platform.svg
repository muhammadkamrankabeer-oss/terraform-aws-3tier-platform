<text class="th" x="259" y="325" text-anchor="middle" dominant-baseline="central" fill="#0C447C" font-size="12">Nginx · port 8080</text>

<!-- SG badge frontend -->
<rect x="174" y="360" width="170" height="36" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="0.8" stroke-dasharray="3 2"/>
<text class="ts" x="259" y="374" text-anchor="middle" dominant-baseline="central" fill="#BF360C" font-size="11">Security Group</text>
<text class="ts" x="259" y="389" text-anchor="middle" dominant-baseline="central" fill="#E65100" font-size="10">allow :8080 (0.0.0.0/0), :22</text>

<!-- Elastic IP badge -->
<rect x="174" y="408" width="170" height="22" rx="5" fill="#E8F5E9" stroke="#388E3C" stroke-width="0.8"/>
<text class="ts" x="259" y="423" text-anchor="middle" dominant-baseline="central" fill="#1B5E20" font-size="11">Elastic / Public IP assigned</text>

<!-- Route table public -->
<rect x="380" y="228" width="240" height="88" rx="10" fill="#FFFFFF" stroke="#B5D4F4" stroke-width="1"/>
