<text class="ts" x="340" y="168" text-anchor="middle" dominant-baseline="central" fill="#85B7EB">igw · attached to VPC</text>

<!-- ── PUBLIC SUBNET ── -->
<rect x="142" y="200" width="500" height="260" rx="10" fill="#DBEEFF" fill-opacity="0.5" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="4 3"/>
